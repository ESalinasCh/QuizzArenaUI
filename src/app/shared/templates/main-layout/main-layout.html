<div class="flex h-screen w-screen overflow-hidden bg-light-bg dark:bg-dark-bg text-light-text dark:text-dark-text transition-colors duration-200">
  <!-- Sidebar Organism (fixed on mobile, static on desktop) -->
  <app-sidebar [isOpen]="isSidebarOpen()" (closeSidebar)="closeSidebar()" />

  <!-- Main View Column -->
  <div class="flex-1 flex flex-col h-full overflow-hidden">
    <!-- Navbar Organism -->
    <app-navbar (toggleSidebar)="toggleSidebar()" />

    <!-- Main Content Area -->
    <main class="flex-1 overflow-hidden px-6 pb-6 lg:px-8 lg:pb-8">
      <!-- Rounded Card Container -->
      <div class="w-full h-full overflow-y-auto bg-light-surface dark:bg-dark-surface rounded-t-2xl lg:rounded-2xl border border-light-border dark:border-dark-border shadow-card dark:shadow-dark-card transition-all duration-200">
        <!-- Inner View Content wrapper -->
        <div class="p-6 md:p-8">
          <router-outlet />
        </div>
      </div>
    </main>
  </div>
</div>
