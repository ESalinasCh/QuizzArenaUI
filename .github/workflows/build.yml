name: Angular build and test

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: QuizzArenaUI

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: QuizzArenaUI/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Run unit tests
        run: npm run test -- --watch=false

      - name: Add Coverage to Job Summary
        if: always()
        run: |
          node -e "
          const fs = require('fs');
          const summaryPath = 'coverage/QuizzArenaUI/coverage-summary.json';
          if (!fs.existsSync(summaryPath)) {
            console.log('Coverage summary not found at ' + summaryPath);
            process.exit(0);
          }
          const summary = JSON.parse(fs.readFileSync(summaryPath)).total;
          const md = '## 📊 Frontend Code Coverage Summary\n\n' +
            '| Metric | Coverage % | Total Lines | Covered Lines |\n' +
            '| :--- | :---: | :---: | :---: |\n' +
            '| **Lines** | ' + summary.lines.pct + '% | ' + summary.lines.total + ' | ' + summary.lines.covered + ' |\n' +
            '| **Statements** | ' + summary.statements.pct + '% | ' + summary.statements.total + ' | ' + summary.statements.covered + ' |\n' +
            '| **Branches** | ' + summary.branches.pct + '% | ' + summary.branches.total + ' | ' + summary.branches.covered + ' |\n' +
            '| **Functions** | ' + summary.functions.pct + '% | ' + summary.functions.total + ' | ' + summary.functions.covered + ' |\n';
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md);
          "

      - name: Production build
        run: npm run build -- --configuration production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: quizzarena-ui-dist
          path: QuizzArenaUI/dist/QuizzArenaUI/browser
          if-no-files-found: error

  docker:
    # Publish an image only when changes land on a tracked branch, not on PRs.
    if: github.event_name == 'push'
    needs: build-and-test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6.0.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Extract image metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: QuizzArenaUI/QuizzArenaUI
          file: QuizzArenaUI/QuizzArenaUI/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
