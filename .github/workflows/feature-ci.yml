name: Feature CI

# Mirrors the local pre-push quality gate for every push to a feature branch.
# Keeps feedback fast and local-to-CI consistent.

on:
  push:
    branches:
      - 'feature/**'
      - 'fix/**'
      - 'chore/**'
      - 'docs/**'
      - 'refactor/**'

env:
  NODE_VERSION: '24'
  HUSKY: '0' # prevent git hooks from running inside the runner

defaults:
  run:
    working-directory: QuizzArenaUI

jobs:
  # ── 1. Lint (ESLint) ────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: QuizzArenaUI/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

  # ── 2. Formatting (Prettier) ────────────────────────────────────────────────
  format:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: QuizzArenaUI/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prettier --check
        run: npm run format

  # ── 3. Type-check (tsc) ─────────────────────────────────────────────────────
  type-check:
    name: Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: QuizzArenaUI/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: tsc --noEmit
        run: npm run type-check

  # ── 4. Unit tests ───────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: QuizzArenaUI/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test -- --watch=false

  # ── 5. Production build ─────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: QuizzArenaUI/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build -- --configuration production

  # ── 6. Secret scan (full git history) ───────────────────────────────────────
  scan-secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    # gitleaks needs the repo root, not the app subdirectory.
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history required for gitleaks detect

      - name: Gitleaks — detect secrets in history
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # ── 7. Dependency vulnerability audit ───────────────────────────────────────
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: QuizzArenaUI/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit (fail on high/critical)
        run: npm audit --audit-level=high
