server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip text assets.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Long-lived caching for hashed build assets.
    location ~* \.(?:js|css|woff2?|ttf|eot|png|jpe?g|gif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Runtime config is rendered per-deploy by the entrypoint script; never cache it.
    # Fetched with an absolute path (/config.json) so it resolves from the root
    # regardless of the per-locale <base href> set by the Angular i18n build.
    location = /config.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Per-locale SPA routing.
    # Angular router owns all sub-paths within each locale; unknown paths fall
    # back to the locale's app shell so the router can handle them client-side.

    location /en/ {
        try_files $uri /en/index.html;
    }

    location /es/ {
        try_files $uri /es/index.html;
    }

    # Never cache the per-locale app shells — new deploys must be picked up immediately.
    location = /en/index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /es/index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Root — language-selector page (public/index.html).
    # Redirects the browser to /en/ or /es/ based on navigator.language.
    # Never cache it so locale preference changes are respected on next visit.
    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
