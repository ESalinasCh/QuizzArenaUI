<section class="mx-auto flex w-full max-w-[720px] flex-col gap-6 pb-6">
  <h1 i18n="Grade panel page heading" class="text-xl font-extrabold text-light-text dark:text-dark-text sm:text-2xl">
    Grades
  </h1>

  <div
    class="flex flex-col gap-3 rounded-2xl border border-light-border-strong bg-light-surface p-4 shadow-sm dark:border-dark-border-strong dark:bg-dark-surface-alt">
    <label for="match-select" i18n="Grade panel match selector label"
      class="text-sm font-semibold text-light-text dark:text-dark-text">
      Select an exam
    </label>

    <div class="relative">
      <select id="match-select" [value]="selectedMatchId()" (change)="onMatchChange($any($event.target).value)"
        class="h-12 w-full rounded-xl border border-light-border-strong bg-light-surface px-4 pr-10 text-base text-light-text outline-none transition-colors focus:border-primary dark:border-dark-border-strong dark:bg-dark-bg dark:text-dark-text"
        i18n-aria-label="Grade panel match selector aria label" aria-label="Select an exam">
        <option value="" disabled selected hidden>
          Select an exam
        </option>
        @for (match of matches(); track match.id) {
        <option [value]="match.id">{{ match.title }}</option>
        }
      </select>
    </div>
  </div>

  <div class="flex flex-col space-y-3">
    @for (grade of grades.value() ?? []; track grade.id) {
    <qz-grade-card [grade]="grade" [expanded]="expandedGrade() === grade.id"
      (toggleAttempts)="toggleAttempts($event)" />
    } @empty {
    <h2 class="text-xl font-bold text-light-text flex justify-center dark:text-dark-text">
      {{ noGradesMessage }}
    </h2>
    }
  </div>
</section>
