<section class="mx-auto flex w-full max-w-[720px] flex-col gap-6 pb-6">
  <header class="flex items-center justify-between">
    <button
      type="button"
      class="flex h-10 w-10 items-center justify-center rounded-xl bg-primary-light text-primary transition hover:bg-primary-soft dark:bg-dark-surface-alt dark:text-primary"
      aria-label="Volver al dashboard"
      (click)="goBack()"
    >
      <app-icon name="arrow-left" class="h-5 w-5" />
    </button>

    <h1 class="text-xl font-extrabold text-primary dark:text-dark-text sm:text-2xl">
      Cargar Contenido
    </h1>
  </header>

  <label
    class="flex cursor-pointer flex-col items-center justify-center gap-2 rounded-2xl border-2 border-dashed px-6 py-10 text-center transition-colors"
    [class.border-primary]="!isDragging()"
    [class.border-primary-hover]="isDragging()"
    [class.bg-primary-light]="isDragging()"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave()"
    (drop)="onDrop($event)"
  >
    <input
      type="file"
      class="sr-only"
      [accept]="acceptedExtensions"
      (change)="onFileSelected($event)"
    />

    <app-icon
      name="upload"
      class="h-10 w-10 text-light-text-secondary dark:text-dark-text-secondary"
    />

    @if (file(); as selectedFile) {
      <p class="text-sm font-semibold text-light-text dark:text-dark-text">
        {{ selectedFile.name }}
      </p>
      <button
        type="button"
        class="text-xs font-medium text-danger underline"
        (click)="removeFile(); $event.preventDefault()"
      >
        Quitar archivo
      </button>
    } @else {
      <p class="text-sm font-semibold text-primary">
        Tocar para seleccionar
        <span class="block font-bold text-light-text dark:text-dark-text">
          o arrastra un archivo
        </span>
      </p>
      <p class="text-xs text-light-text-secondary dark:text-dark-text-secondary">
        {{ acceptedExtensionsLabel }}
      </p>
    }
  </label>

  <form class="flex flex-col gap-4" (ngSubmit)="submit()">
    <h2 class="text-sm font-bold uppercase tracking-wide text-light-text dark:text-dark-text">
      Datos del contenido
    </h2>

    <div class="flex flex-col gap-2">
      <label
        for="class-name"
        class="text-sm font-semibold text-light-text dark:text-dark-text"
      >
        Nombre de la clase
      </label>
      <input
        id="class-name"
        type="text"
        name="className"
        [ngModel]="className()"
        (ngModelChange)="className.set($event)"
        placeholder="Ej: Clase DDD - Semana 3"
        class="h-12 rounded-xl border border-light-border-strong bg-light-surface px-4 text-base text-light-text outline-none transition-colors placeholder:text-light-text-secondary focus:border-primary dark:border-dark-border-strong dark:bg-dark-bg dark:text-dark-text dark:placeholder:text-dark-text-secondary"
      />
    </div>

    <div class="flex flex-col gap-2">
      <label
        for="subject"
        class="text-sm font-semibold text-light-text dark:text-dark-text"
      >
        Materia
      </label>
      <div class="relative">
        <select
          id="subject"
          name="subjectId"
          [ngModel]="subjectId()"
          (ngModelChange)="subjectId.set($event)"
          class="h-12 w-full appearance-none rounded-xl border border-light-border-strong bg-light-surface px-4 pr-10 text-base text-light-text outline-none transition-colors focus:border-primary dark:border-dark-border-strong dark:bg-dark-bg dark:text-dark-text"
          [class.text-light-text-secondary]="subjectId() === ''"
        >
          <option value="" disabled>Selecciona una clase</option>
          @for (subject of subjects(); track subject.id) {
            <option [value]="subject.id">{{ subject.name }}</option>
          }
        </select>
        <app-icon
          name="chevron-down"
          class="pointer-events-none absolute right-4 top-1/2 h-4 w-4 -translate-y-1/2 text-light-text dark:text-dark-text"
        />
      </div>
    </div>

    <app-button
      size="large"
      variant="primary"
      type="submit"
      [fullWidth]="true"
      [disabled]="!canSubmit()"
      ariaLabel="Cargar contenido"
    >
      <app-icon name="upload" class="h-5 w-5" />
      <span>Cargar Contenido</span>
    </app-button>
  </form>
</section>
