<section class="mx-auto flex w-full max-w-5xl flex-col gap-5">
  <div class="flex flex-col gap-2">
    <p class="text-sm font-semibold text-primary">Teacher</p>
    <h2 class="text-2xl font-bold text-light-text dark:text-dark-text">Quiz management</h2>

    <div class="flex gap-3">
      <div class="flex-8">
        <qz-text-input placeholder="Search your question here" [formField]="searchForm.name" />
      </div>
      <div class="flex-0">
        <qz-button class="flex-0" [fullWidth]="true" [variant]="'secondary'" (click)="toogleQuestionFilterModal()">
          <qz-icon [name]="'filter'" />
        </qz-button>
      </div>
    </div>

    <qz-admin-question-card></qz-admin-question-card>
    <qz-admin-question-card></qz-admin-question-card>
    <qz-admin-question-card></qz-admin-question-card>
    <qz-admin-question-card></qz-admin-question-card>
    <qz-admin-question-card></qz-admin-question-card>
    <qz-admin-question-card></qz-admin-question-card>
  </div>
</section>

@if (questionFilterModalIsOpen()) {
  <qz-question-filter-modal
    (handleToogleModal)="toogleQuestionFilterModal()"
  />
}
