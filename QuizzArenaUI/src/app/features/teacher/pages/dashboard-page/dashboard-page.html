<section class="mx-auto flex w-full max-w-[720px] flex-col gap-6 pb-6">
  <h1 class="text-xl font-extrabold text-light-text dark:text-dark-text sm:text-2xl">
    Bienvenido, {{ displayName() }}
  </h1>

  <div class="mx-auto flex w-full max-w-[480px] justify-center gap-4">
    <app-stat-card
      label="Quizzes"
      [value]="dashboard().quizCount"
      variant="blue"
    />
    <app-stat-card
      label="Publicados"
      [value]="dashboard().publishedCount"
      variant="green"
    />
  </div>

  <app-button
    size="large"
    variant="primary"
    [fullWidth]="true"
    (btnClick)="uploadContent()"
    ariaLabel="Cargar contenido"
  >
    <app-icon name="upload" class="w-5 h-5" />
    <span>Cargar Contenido</span>
  </app-button>

  <div class="flex flex-col gap-4">
    <h2 class="text-base font-bold text-light-text dark:text-dark-text">
      Contenido Reciente
    </h2>

    <div class="flex flex-col gap-3">
      @for (item of dashboard().recentContent; track item.id) {
        <app-content-item
          [title]="item.title"
          [status]="item.status"
          [info]="item.info"
        />
      }
    </div>
  </div>
</section>
