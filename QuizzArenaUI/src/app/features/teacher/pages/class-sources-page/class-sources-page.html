<section class="mx-auto flex w-full max-w-5xl flex-col gap-5">
  <div class="flex flex-col gap-2">
    <p class="text-sm font-semibold text-primary">Teacher</p>
    <h2 class="text-2xl font-bold text-light-text dark:text-dark-text">
      Class Sources
    </h2>

    @if (classSources().length > 0) {
      <div class="w-full sm:max-w-md mt-2">
        <qz-text-input
          placeholder="Search class sources..."
          [value]="searchQuery()"
          (valueChange)="searchQuery.set($event)"
        />
      </div>
    }

    <div class="flex flex-col gap-3 mt-4">
      @for (source of visibleClassSources(); track source.id) {
        <qz-class-source-card [source]="source" />
      } @empty {
        @if (!isLoading()) {
          <div class="flex justify-center items-center h-[40vh]">
            <qz-text-span [text]="'No Class Sources found'" />
          </div>
        }
      }

      @if (isLoading()) {
        <div class="flex justify-center items-center py-8">
          <qz-text-span [text]="'Loading Class Sources...'" />
        </div>
      }
    </div>

    @if (hasMoreClassSources()) {
      <div class="flex justify-center mt-4">
        <qz-button variant="secondary" (click)="loadMore()">Load More</qz-button>
      </div>
    }
  </div>
</section>
