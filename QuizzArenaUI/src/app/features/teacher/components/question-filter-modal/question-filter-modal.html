<qz-modal 
    [(isModalOpened)]="isModalOpened"
    [title]="'Filters'"
    [closeOnOverlayClick]="true"
    [showCloseButton]="true"
    [showFooter]="false"
>
    <form class="p-3 flex-col gap-3" (submit)="$event.preventDefault(); applyFilters()">
        <div class="flex flex-col gap-2">
            <span class="">State</span>
            <div class="flex gap-4">
                @for (option of statusOptions(); track option.key) {
                <qz-checkbox-input type="checkbox" [label]="option.label" [formField]="filterForm.status[option.key]" />
                }
            </div>
        </div>
        <div class="flex flex-col gap-2">
            <span class="">Type</span>
            <div class="flex gap-4">
                @for (option of typeOptions(); track option.key) {
                <qz-checkbox-input type="checkbox" [label]="option.label" [formField]="filterForm.types[option.key]" />
                }
            </div>
        </div>

        <div class="flex gap-4 pt-6 justify-end">
            <qz-button type="button" (click)="cleanFilters()" [variant]="'secondary'" [fullWidth]="true">
                Clean
            </qz-button>
            <qz-button type="submit" [fullWidth]="true" [variant]="'primary'">
                Apply FIlters
            </qz-button>
        </div>
    </form>
</qz-modal>
