<qz-modal [(isModalOpened)]="isModalOpened" (closeEvent)="handleCloseModal()" [title]="'Edit'"
    [closeOnOverlayClick]="false" [showCloseButton]="true" [showFooter]="false" class="flex flex-col gap-3">
    <form class="p-3" (submit)="handleSubmitForm($event)">
        <qz-textarea-input [label]="'Question'" [formField]="questionForm.content"></qz-textarea-input>
        <qz-select-input [label]="'Status'" [formField]="questionForm.status">
            @for (state of states(); track $index) {
            <option [value]="state.key">
                {{ state.label }}
            </option>
            }
        </qz-select-input>
        <qz-select-input [label]="'Type'" [formField]="questionForm.type">
            @for (type of types(); track $index) {
            <option [value]="type.key">
                {{ type.label }}
            </option>
            }
        </qz-select-input>
        <qz-text-span [bold]="'bold'">
            Answers
        </qz-text-span>
        <div class="flex flex-col gap-4" >
            @for (option of options(); track $index) {
                <qz-item-container
                    [clickable]="true"
                    [variant]="option.isCorrect ? 'success' : 'danger'"
                    (click)="handleClickOptionToChangeCorrectStatus(option)"
                >
                    {{ option.description }}
                </qz-item-container>
            }
        </div>
        <div class="flex justify-between gap-3 flex-wrap mt-12">
            <qz-button [type]="'button'" [fullWidth]="true" [variant]="'secondary'" (click)="handleCancelButton()" >
                Cancel
            </qz-button>
            <qz-button [type]="'submit'" [fullWidth]="true" [variant]="'primary'">
                Submit
            </qz-button>
        </div>
    </form>
</qz-modal>
