<div class="flex flex-col gap-3 rounded-2xl border border-light-border-strong bg-light-surface p-4 dark:border-dark-border-strong dark:bg-dark-bg">

  <div class="flex items-center justify-between">
    <span i18n="Exam question card question label" class="text-xs font-semibold uppercase tracking-wide text-light-text-secondary dark:text-dark-text-secondary">
      Question
    </span>
    <span i18n="Exam question card score label" class="text-xs font-semibold text-light-text-secondary dark:text-dark-text-secondary">
      Score: 1
    </span>
  </div>

  <div class="rounded-xl border border-light-border bg-white px-4 py-3 text-sm text-light-text dark:border-dark-border dark:bg-dark-surface dark:text-dark-text">
    {{ question().text }}
  </div>

  <div class="flex flex-col gap-2">
    @for (option of question().options; track $index) {
      <div class="rounded-xl border border-light-border bg-white px-4 py-2.5 text-sm text-light-text dark:border-dark-border dark:bg-dark-surface dark:text-dark-text">
        {{ option }}
      </div>
    }
  </div>

  <div class="flex gap-2 pt-1">
    <button
      type="button"
      class="flex flex-1 items-center justify-center gap-2 rounded-xl py-2.5 text-sm font-semibold transition-colors"
      [class.bg-primary]="selected()"
      [class.text-white]="selected()"
      [class.bg-primary-light]="!selected()"
      [class.text-primary]="!selected()"
      (click)="toggleSelect.emit()"
    >
      <qz-icon [name]="selected() ? 'check' : 'plus'" class="h-4 w-4" />
      @if (selected()) {
        <span i18n="Exam question card added to exam label">Added to exam</span>
      } @else {
        <span i18n="Exam question card add to exam label">Add to exam</span>
      }
    </button>

    <button
      type="button"
      class="flex items-center justify-center gap-2 rounded-xl bg-danger-light px-4 py-2.5 text-sm font-semibold text-danger transition-colors hover:bg-danger hover:text-white dark:bg-danger-bg-dark dark:text-danger"
      (click)="remove.emit()"
    >
      <qz-icon name="trash" class="h-4 w-4" />
      <span i18n="Exam question card remove from bank label">Remove from bank</span>
    </button>
  </div>

</div>
