<qz-modal
    [(isModalOpened)]="isModalOpened"
    (closeEvent)="handleCloseModalEvent()"
    [title]="'Information'"
    [closeOnOverlayClick]="true"
    [showCloseButton]="true"
    [showFooter]="false"
>
    <qz-item-container>
        Date Creation: {{ question().createdAt | date:'dd/MM/yyyy' }}
    </qz-item-container>
    <qz-item-container>
        Processing Job Id: {{ question().processingJobId }}
    </qz-item-container>
    <qz-item-container>
        Status: {{ question().status }}
    </qz-item-container>
    <qz-item-container>
        <div class="flex justify-end">
            <qz-button [size]="'small'" [variant]="'secondary'" (click)="closeModalClick()">
                Close
            </qz-button>
        </div>
    </qz-item-container>
</qz-modal>
