<section class="min-h-screen bg-light-bg text-light-text dark:bg-dark-bg dark:text-dark-text">
  <div class="mx-auto flex min-h-screen w-full max-w-[430px] flex-col px-6 pb-10 pt-4 sm:max-w-[520px] sm:px-8">
    <button
      type="button"
      class="flex h-10 w-10 items-center justify-center rounded-xl bg-primary-light text-primary transition hover:bg-primary-soft dark:bg-dark-surface-alt dark:text-primary"
      aria-label="Volver a quizzes disponibles"
      (click)="goBack()"
    >
      <app-icon name="arrow-left" class="h-5 w-5" />
    </button>

    @if (quiz(); as quizData) {
      <div class="flex flex-1 flex-col items-center justify-center gap-8 pb-10 pt-12">
        <div
          class="flex h-40 w-40 items-center justify-center rounded-full bg-purple-light text-5xl dark:bg-dark-surface-alt"
          aria-hidden="true"
        >
          📝
        </div>

        <div class="text-center">
          <h1 class="text-[40px] font-extrabold leading-none tracking-normal text-light-text dark:text-white sm:text-5xl">
            {{ quizData.title }}
          </h1>
          <p class="mt-1 text-2xl font-medium leading-tight text-purple dark:text-purple-dark">
            {{ quizData.subtitle }}
          </p>
        </div>

        <div
          class="flex w-full flex-col items-center gap-6 rounded-3xl border border-light-border-strong bg-light-surface px-6 py-7 text-base font-medium text-light-text-secondary shadow-card dark:border-dark-border-strong dark:bg-dark-surface-alt dark:text-dark-text-secondary dark:shadow-none"
        >
          <p>📖 {{ quizData.questionCount }} preguntas</p>
          <p>👨‍🏫 {{ quizData.professorName }}</p>
          <p>⏱️ {{ timeLimitLabel() }}</p>
        </div>

        <button
          type="button"
          class="mt-4 flex h-[74px] w-full items-center justify-center gap-2 rounded-2xl bg-purple px-5 text-xl font-bold text-white shadow-button transition hover:bg-primary active:scale-[0.98]"
          (click)="beginQuiz()"
        >
          <app-icon name="play" class="h-5 w-5 fill-white" />
          Comenzar
        </button>
      </div>
    }
  </div>
</section>
