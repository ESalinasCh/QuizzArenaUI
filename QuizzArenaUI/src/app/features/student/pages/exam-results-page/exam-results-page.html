<section class="mx-auto flex w-full max-w-[720px] flex-col gap-7 pb-6">
  @if (result(); as resultData) {
    <header class="flex flex-col items-center gap-2 text-center">
      <h1 class="text-3xl font-extrabold text-light-text dark:text-white">
        {{ resultData.title }}
      </h1>
      <p class="text-xl font-medium text-purple dark:text-purple-dark">
        {{ resultData.subtitle }}
      </p>
    </header>

    <h2 i18n="Student exam results section title" class="text-center text-2xl font-extrabold text-light-text dark:text-white">
      Exam completed
    </h2>

    <div class="rounded-2xl bg-success-bg-light px-5 py-4 text-center text-xl font-extrabold text-success-text-light dark:bg-success-bg-dark dark:text-success-text-dark">
      {{ answeredProgressLabel() }}
    </div>

    <div class="flex flex-col gap-5">
      @for (answer of resultData.answers; track answer.id) {
        <article
          class="rounded-2xl border border-light-border-strong bg-light-surface px-4 py-4 shadow-sm dark:border-dark-border-strong dark:bg-dark-surface-alt"
        >
          <div class="flex items-center gap-2 text-sm font-extrabold text-purple dark:text-purple-dark">
            <qz-icon name="check" class="h-4 w-4" />
            <span i18n="Student exam answered question number">Question {{ answer.number }}</span>
          </div>

          <p class="mt-3 text-center text-base leading-snug text-light-text dark:text-white">
            {{ answer.text }}
          </p>

          <p class="mt-3 min-w-0 truncate text-sm font-medium text-light-text-secondary dark:text-dark-text-secondary">
            <ng-container i18n="Student exam selected option label">Selected option:</ng-container>
            {{ answer.selectedOptionId ?? '-' }}
          </p>
        </article>
      }
    </div>

    <button
      type="button"
      class="flex h-14 w-full items-center justify-center rounded-2xl border border-purple px-5 text-base font-extrabold text-purple transition hover:bg-purple-light dark:hover:bg-dark-surface-alt"
      (click)="goHome()"
    >
      <ng-container i18n="Student exam back to exams button">Back to exams</ng-container>
    </button>
  }
</section>
