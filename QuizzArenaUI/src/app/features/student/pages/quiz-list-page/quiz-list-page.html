<section class="mx-auto flex w-full max-w-180 flex-col gap-6 pb-6">
  <h1
    i18n="Student dashboard welcome heading"
    class="text-xl font-extrabold text-light-text dark:text-dark-text sm:text-2xl"
  >
    Welcome, {{ displayName() }} &#128075;
  </h1>

  <qz-quiz-access-form (submitQuizLink)="goToQuizFromLink($event)" />

  <div class="flex flex-col gap-4">
    <qz-section-title [title]="availableQuizzesTitle" icon="sparkles" />

    <div class="flex flex-col gap-4">
      @for (quiz of dashboard().availableQuizzes; track quiz.id) {
        <qz-available-quiz-card [quiz]="quiz" (startQuiz)="startQuiz($event)" />
      }
    </div>
  </div>

  <div class="flex flex-col gap-4">
    <qz-section-title [title]="recentQuizzesTitle" icon="clock" />

    <div class="flex flex-col gap-4">
      @for (quiz of dashboard().recentQuizzes; track quiz.id) {
        <qz-recent-quiz-card [quiz]="quiz" (viewResults)="viewResults($event)" />
      }
    </div>
  </div>
</section>
