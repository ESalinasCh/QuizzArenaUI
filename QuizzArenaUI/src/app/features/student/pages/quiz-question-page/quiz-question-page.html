<section class="min-h-screen bg-light-bg text-light-text dark:bg-dark-bg dark:text-dark-text">
  <div class="mx-auto flex min-h-screen w-full max-w-[430px] flex-col gap-5 px-3 pb-10 pt-3 sm:max-w-[520px] sm:px-6">
    @if (currentQuestion(); as question) {
      <div class="rounded-2xl bg-purple px-5 py-3 text-center text-xl font-medium text-white shadow-button">
        {{ progressLabel() }}
      </div>

      <div class="h-3 overflow-hidden rounded bg-light-border dark:bg-dark-border">
        <div class="h-full rounded bg-purple transition-all duration-300" [style.width.%]="progressPercentage()"></div>
      </div>

      <div class="flex flex-1 flex-col gap-6 px-3 pt-5">
        <article
          class="clean-card px-9 py-6 text-center border-indigo-150/40 dark:border-slate-800"
        >
          <h1 class="text-xl font-bold leading-tight text-light-text dark:text-white">
            {{ question.statement }}
          </h1>
        </article>

        <p
          i18n="Student quiz options section label"
          class="text-center text-sm font-bold uppercase tracking-widest text-light-text-secondary dark:text-dark-text-secondary"
        >
          Options
        </p>

        <div class="flex flex-col gap-4">
          @for (option of question.options; track option.id; let index = $index) {
            <button
              type="button"
              [class]="selectedOptionId() === option.id
                ? 'grid min-h-[78px] grid-cols-[28px_1fr] items-center gap-4 rounded-2xl border-2 border-primary bg-indigo-50/50 px-4 py-4 text-left shadow-md transition-all duration-300 transform scale-[1.01] dark:bg-slate-900/40 dark:shadow-none'
                : 'grid min-h-[78px] grid-cols-[28px_1fr] items-center gap-4 rounded-2xl border-2 border-light-border bg-light-surface px-4 py-4 text-left shadow-sm transition-all duration-300 hover:border-indigo-200 hover:scale-[1.01] dark:border-dark-border dark:bg-dark-surface dark:shadow-none'"
              (click)="selectOption(option.id)"
            >
              <span class="text-xl font-black text-primary dark:text-primary-soft">
                {{ optionLetters[index] }}
              </span>
              <span class="text-left text-base font-semibold leading-snug text-light-text dark:text-white">
                {{ option.label }}
              </span>
            </button>
          }
        </div>

        <button
          type="button"
          class="mt-2 flex h-[74px] w-full items-center justify-center gap-2 rounded-2xl bg-purple px-5 text-lg font-extrabold text-white shadow-button transition hover:bg-primary active:scale-[0.98] disabled:cursor-not-allowed disabled:opacity-60"
          [disabled]="!selectedOptionId() || isSubmitting()"
          (click)="confirmAnswer()"
        >
          <ng-container i18n="Student quiz confirm answer button">Confirm answer</ng-container>
          <qz-icon name="arrow-right" class="h-5 w-5" />
        </button>
      </div>
    }
  </div>
</section>
