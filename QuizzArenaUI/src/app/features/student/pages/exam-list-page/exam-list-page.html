<section class="mx-auto flex w-full max-w-180 flex-col gap-6 pb-6">
  <h1 i18n="Student exams" class="text-xl font-extrabold text-light-text dark:text-dark-text sm:text-2xl">
    Exams &#128075;
  </h1>

  <div class="flex flex-col gap-4">
    <qz-section-title [title]="availableExamsTitle" icon="sparkles" />

    <qz-filter-tabs
      [options]="statusOptions"
      [value]="filters().status"
      (valueChange)="changeStatus($event)">
    </qz-filter-tabs>

    @if ((exams.value()?.length ?? 0) === 0) {
      <h2 class="text-xl font-bold text-light-text flex justify-center dark:text-dark-text">
        {{ noExamsMessage }}
      </h2>
    } @else {
      <div class="flex flex-col gap-4">
        @for (quiz of exams.value() ?? []; track quiz.id) {
          <qz-available-quiz-card [quiz]="quiz" (startQuiz)="startQuiz($event)" />
        }
      </div>
    }
  </div>
</section>
