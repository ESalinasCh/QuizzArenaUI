<div class="flex flex-col items-center gap-5 px-6 py-7 text-center">
  <div>
    <h2 class="text-2xl font-extrabold text-light-text dark:text-white">
      {{ title }}
    </h2>
    <p class="mt-3 text-base font-medium leading-relaxed text-light-text-secondary dark:text-dark-text-secondary">
      {{ message }}
    </p>
  </div>

  <button
    type="button"
    class="rounded-2xl bg-primary px-7 py-3 text-base font-bold text-white shadow-button transition hover:bg-purple active:scale-[0.98]"
    (click)="close()"
  >
    {{ actionLabel }}
  </button>
</div>
