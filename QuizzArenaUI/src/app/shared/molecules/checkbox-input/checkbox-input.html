<div class="flex items-center gap-1">
    <input
        type="checkbox"
        class="mt-0.5 h-4 w-4 accent-primary"
        [checked]="checked()"
        [disabled]="disabled()"
        (change)="checked.set($any($event.target).checked)"
        (blur)="touched.set(true)"
    />
    <label [for]="for()" class="block">
        {{ label() }}
    </label>
</div>
