@if (isOpen()) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 px-6"
    role="dialog"
    aria-modal="true"
    aria-label="Something went wrong"
    i18n-aria-label="API error dialog aria label"
  >
    <section
      class="w-full max-w-sm rounded-2xl border border-light-border-strong bg-light-surface p-6 text-center text-light-text shadow-card dark:border-dark-border-strong dark:bg-dark-surface dark:text-dark-text"
    >
      <h2 class="text-2xl font-extrabold leading-tight">
        <ng-container i18n="API error dialog title">Something went wrong</ng-container>
      </h2>

      <p class="mt-3 text-base font-medium text-light-text-secondary dark:text-dark-text-secondary">
        {{ message() }}
      </p>

      @if (statusCode(); as status) {
        <p class="mt-4 text-sm font-semibold text-danger dark:text-danger-text-dark">
          <ng-container i18n="API error dialog status code label">Error code:</ng-container>
          {{ status }}
        </p>
      }

      <qz-button class="mt-6 block" size="large" [fullWidth]="true" (click)="action.emit()">
        {{ actionLabel() }}
      </qz-button>
    </section>
  </div>
}
