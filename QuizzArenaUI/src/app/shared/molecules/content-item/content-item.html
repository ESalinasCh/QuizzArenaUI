<div
  class="flex items-center justify-between rounded-2xl bg-light-surface dark:bg-dark-surface px-4 py-4 shadow-card dark:shadow-dark-card"
>
  <div class="flex flex-col gap-2">
    <span class="text-sm font-semibold text-light-text dark:text-dark-text">
      {{ title() }}
    </span>
    <app-badge [label]="statusLabel()" [variant]="statusVariant()" />
  </div>

  <span class="text-sm font-medium text-primary dark:text-primary shrink-0">
    {{ info() }}
  </span>
</div>
