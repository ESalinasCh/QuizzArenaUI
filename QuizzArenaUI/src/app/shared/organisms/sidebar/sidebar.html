@if (isOpen()) {
  <button
    type="button"
    (click)="onCloseClick()"
    class="fixed inset-0 z-40 bg-black/30 backdrop-blur-xs lg:hidden transition-opacity duration-300 cursor-default focus:outline-none"
    aria-label="Close sidebar overlay"
  ></button>
}

<aside
  [ngClass]="isOpen() ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'"
  class="fixed lg:relative left-0 top-0 h-screen lg:h-auto z-50 lg:z-auto w-64 bg-light-bg dark:bg-dark-bg border-r border-light-border dark:border-dark-border flex flex-col px-4 py-6 transition-transform duration-300 ease-in-out lg:translate-x-0"
>
  <div class="flex items-center justify-between mb-8 px-2">
    <div class="flex items-center gap-2">
      <h1 class="text-xl font-bold text-light-text dark:text-dark-text tracking-tight">
        Quiz<span class="text-primary">Arena</span>
      </h1>
    </div>

    <div class="lg:hidden">
      <app-button size="icon" variant="ghost" (btnClick)="onCloseClick()" ariaLabel="Close sidebar">
        <app-icon name="close" class="w-5 h-5" />
      </app-button>
    </div>
  </div>

  <nav class="flex-1 flex flex-col gap-1.5">
    <app-nav-item
      label="Dashboard"
      icon="dashboard"
      routerLink="/dashboard"
      (click)="onCloseClick()"
    />
    <app-nav-item
      label="Cuestionarios"
      icon="quiz"
      routerLink="/quizzes"
      (click)="onCloseClick()"
    />
    <app-nav-item
      label="Configuración"
      icon="settings"
      routerLink="/settings"
      (click)="onCloseClick()"
    />
  </nav>

  <div class="border-t border-light-border dark:border-dark-border pt-4">
    <app-button
      size="icon"
      variant="ghost"
      class="w-full"
      (btnClick)="toggleTheme()"
      [ariaLabel]="currentTheme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
    >
      <app-icon [name]="currentTheme() === 'dark' ? 'sun' : 'moon'" class="w-5 h-5" />
    </app-button>
  </div>

</aside>
