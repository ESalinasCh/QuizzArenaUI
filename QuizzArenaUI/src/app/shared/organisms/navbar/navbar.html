<header
  class="flex items-center justify-between w-full h-18 px-6 md:px-8 bg-light-bg dark:bg-dark-bg transition-colors duration-200 select-none">
  <div class="lg:hidden">
    <qz-button size="icon" variant="ghost" (click)="toggleSidebar.emit()"
      i18n-ariaLabel="Aria label to toggle navigation sidebar" ariaLabel="Toggle navigation sidebar">
      <qz-icon name="menu" />
    </qz-button>
  </div>

  <div class="flex-1"></div>

  <div class="flex items-center gap-4">
    <qz-language-selector />
    <qz-user-menu />
  </div>
</header>
