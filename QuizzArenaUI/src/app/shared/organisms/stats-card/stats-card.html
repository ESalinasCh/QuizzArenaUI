<div class="clean-card p-5 flex items-center justify-around">
  <div class="flex flex-col items-center text-center">
    <span class="text-[10px] font-bold text-light-text-secondary dark:text-dark-text-secondary uppercase tracking-widest">{{ quizzesLabel() }}</span>
    <span class="text-3xl font-black text-light-text dark:text-white mt-1 leading-none">{{ quizCount() }}</span>
    <span class="text-[9px] text-emerald-600 dark:text-emerald-400 font-semibold mt-1.5">↑ 12% active</span>
  </div>

  <div class="h-10 w-px bg-light-border/60 dark:bg-dark-border/60"></div>

  <div class="flex flex-col items-center text-center">
    <span class="text-[10px] font-bold text-light-text-secondary dark:text-dark-text-secondary uppercase tracking-widest">{{ publishedLabel() }}</span>
    <span class="text-3xl font-black text-light-text dark:text-white mt-1 leading-none">{{ publishedCount() }}</span>
    <span class="text-[9px] text-emerald-600 dark:text-emerald-400 font-semibold mt-1.5">↑ 8% live</span>
  </div>
</div>
