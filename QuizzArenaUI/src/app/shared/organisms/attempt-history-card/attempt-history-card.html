<article
  class="rounded-2xl border border-light-border bg-light-surface px-4 py-4 shadow-card transition dark:border-dark-border dark:bg-dark-surface-alt dark:shadow-none"
>
  <div class="min-w-0">
    <h3 class="truncate text-lg font-extrabold text-light-text dark:text-dark-text">
      {{ title() }}
    </h3>
    <p class="mt-1 truncate text-base font-medium text-purple dark:text-purple-dark">
      {{ subtitle() }}
    </p>
  </div>

  <div class="mt-3 flex flex-wrap gap-x-4 gap-y-1 text-sm text-light-text-secondary dark:text-dark-text-secondary">
    <span>{{ completedAtLabel() }}</span>
    <span>{{ durationLabel() }}</span>
  </div>

  <div class="my-3 h-px bg-light-border-strong dark:bg-dark-border-strong"></div>

  <div class="flex items-center justify-between gap-4">
    <div class="flex min-w-0 items-center gap-3">
      <strong class="text-base font-extrabold text-light-text dark:text-dark-text">
        {{ scoreLabel() }}
      </strong>
      <span class="rounded-md px-2 py-1 text-sm font-bold {{ statusBadgeClasses() }}">
        <qz-status-label [label]="statusLabel()" [variant]="statusVariant()" />
      </span>
    </div>

    <button
      type="button"
      class="shrink-0 text-lg font-bold text-info transition hover:text-primary-hover"
      (click)="actionClick.emit()"
    >
      {{ actionLabel() }}
    </button>
  </div>
</article>
