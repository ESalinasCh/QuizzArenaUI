<div class="flex h-screen w-screen overflow-hidden bg-light-bg dark:bg-dark-bg text-light-text dark:text-dark-text transition-colors duration-200">
  @if (!isImmersiveRoute()) {
    <qz-sidebar [isOpen]="isSidebarOpen()" (closeSidebar)="closeSidebar()" />
  }

  <div class="flex-1 flex flex-col h-full overflow-hidden">
    @if (!isImmersiveRoute()) {
      <qz-navbar (toggleSidebar)="toggleSidebar()" />
    }

    <main class="flex-1 overflow-y-auto {{ !isImmersiveRoute() ? 'px-6 pb-6 lg:px-8 lg:pb-8' : '' }}">
      <div
        class="{{ !isImmersiveRoute() ? 'py-4 md:py-8' : '' }}"
      >
        <router-outlet />
      </div>
    </main>
  </div>
</div>

@if (apiErrorService.error(); as error) {
  <qz-api-error-dialog
    [isOpen]="true"
    [message]="error.message"
    [statusCode]="error.statusCode"
    [actionLabel]="error.actionLabel"
    (action)="handleApiErrorAction()"
  />
}
