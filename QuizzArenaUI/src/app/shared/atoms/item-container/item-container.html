<div [class]="`
    transition-colors p-3 
    text-light-text dark:text-light-bg

    ${variant() === 'none' ? 'bg-light-surface dark:bg-dark-surface' : ''}
    ${variant() === 'success' ? 'bg-green-400/50 dark:bg-green-400/50': ''}
    ${variant() === 'danger' ? 'bg-red-400/50 dark:bg-red-400/50' : ''}
    
    ${withBorders() ? 'border border-light-border dark:border-dark-border': ''}
    ${clickable() ? `
        cursor-pointer 
        ${variant()==='none' ? 'hover:bg-light-bg hover:border-primary hover:text-primary dark:hover:bg-dark-border-strong dark:hover:text-light-bg' : ''}
        ${variant()==='success' ? 'hover:bg-green-500/50 hover:border-green-500 hover:text-green-500' : ''}
        ${variant()==='danger' ? 'hover:bg-red-500/50 hover:border-red-500 hover:text-red-500' : ''}
    `: ''}
    ${additionalClasses()}
`">
    <ng-container>
        <ng-content></ng-content>
    </ng-container>
</div>
