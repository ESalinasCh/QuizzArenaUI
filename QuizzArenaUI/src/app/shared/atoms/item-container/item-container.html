<div [class]="`
    transition-colors p-3 bg-light-surface dark:bg-dark-surface 
    text-light-text dark:text-light-bg
    ${withBorders() ? 'border border-light-border dark:border-dark-border': ''}
    ${clickable() ? `
        cursor-pointer 
        hover:bg-light-bg hover:border-primary hover:text-primary
        dark:hover:bg-dark-border-strong dark:hover:text-light-bg
    `: ''}
    ${additionalClasses()}
`">
    <ng-container>
        <ng-content></ng-content>
    </ng-container>
</div>
